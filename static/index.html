<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансии - Работа в кампусе</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/index.html">Работа в кампусе</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/index.html">Вакансии</a>
                <a class="nav-link d-none" id="navProfile" href="/profile.html">Профиль</a>
                <a class="nav-link" id="navLogin" href="/login.html">Войти</a>
                <a class="nav-link d-none" id="navLogout" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container mt-4">
        <!-- Фильтры -->
        <div class="row mb-4 g-2">
            <div class="col-md-3">
                <select id="categoryFilter" class="form-select">
                    <option value="">Все категории</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="typeFilter" class="form-select">
                    <option value="">Все типы</option>
                    <option value="part_time">Частичная</option>
                    <option value="full_time">Полная</option>
                    <option value="internship">Стажировка</option>
                </select>
            </div>
            <div class="col-md-4">
                <input id="searchInput" type="text" class="form-control" placeholder="Поиск по названию">
            </div>
            <div class="col-md-2">
                <button onclick="loadVacancies(true)" class="btn btn-primary w-100">Найти</button>
            </div>
        </div>

        <!-- Список вакансий -->
        <div id="vacancies" class="row g-3"></div>

        <!-- Пустое состояние -->
        <p id="empty" class="text-muted d-none text-center">Вакансии не найдены</p>

        <!-- Кнопка загрузки ещё -->
        <div class="text-center">
            <button id="loadMoreBtn" onclick="loadVacancies(false)" class="btn btn-outline-secondary mt-3">Показать ещё</button>
        </div>
    </div>

    <!-- Подвал -->
    <footer class="text-center mt-5 py-3 text-muted">
        <p>&copy; 2024 Работа в кампусе</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSkip = 0;
        const limit = 10;

        async function loadCategories() {
            const resp = await apiRequest('/api/categories');
            const cats = await resp.json();
            const sel = document.getElementById('categoryFilter');
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                sel.appendChild(opt);
            });
        }

        async function loadVacancies(reset) {
            if (reset) currentSkip = 0;
            const cat = document.getElementById('categoryFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value;
            let url = '/api/vacancies/?skip=' + currentSkip + '&limit=' + limit;
            if (cat) url += '&category_id=' + cat;
            if (type) url += '&employment_type=' + type;
            if (search) url += '&search=' + encodeURIComponent(search);
            const resp = await apiRequest(url);
            const list = await resp.json();
            const cont = document.getElementById('vacancies');
            if (reset) cont.innerHTML = '';
            if (list.length === 0 && currentSkip === 0) {
                document.getElementById('empty').classList.remove('d-none');
            } else {
                document.getElementById('empty').classList.add('d-none');
                list.forEach(function(v) {
                    const salary = (v.salary_from || v.salary_to)
                        ? (v.salary_from || '?') + ' — ' + (v.salary_to || '?') + ' руб.'
                        : 'Зарплата не указана';
                    cont.innerHTML += '<div class="col-md-4"><div class="card h-100">' +
                        '<div class="card-body">' +
                        '<h5 class="card-title">' + v.title + '</h5>' +
                        '<p class="card-text text-muted">' + (v.employer_name || '') + '</p>' +
                        '<p class="card-text">' + (v.category_name || '') + '</p>' +
                        '<p class="card-text small">' + salary + '</p>' +
                        '<span class="badge bg-secondary">' + v.employment_type + '</span>' +
                        '</div><div class="card-footer">' +
                        '<a href="/vacancy.html?id=' + v.id + '" class="btn btn-primary btn-sm">Подробнее</a>' +
                        '</div></div></div>';
                });
                currentSkip += list.length;
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            if (isLoggedIn()) {
                document.getElementById('navLogin').classList.add('d-none');
                document.getElementById('navProfile').classList.remove('d-none');
                document.getElementById('navLogout').classList.remove('d-none');
            }
            document.getElementById('navLogout').addEventListener('click', logout);
            await loadCategories();
            await loadVacancies(true);
        });
    </script>
</body>
</html>
