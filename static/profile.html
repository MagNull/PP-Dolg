<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/index.html">Работа в кампусе</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/index.html">Вакансии</a>
                <a class="nav-link" id="navLogin" href="/login.html">Войти</a>
                <a class="nav-link d-none" id="navProfile" href="/profile.html">Профиль</a>
                <a class="nav-link d-none" id="navLogout" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">Профиль</h4>
                    </div>
                    <div class="card-body">
                        <div id="profileInfo"></div>
                        
                        <!-- Раздел студента -->
                        <div id="studentSection" class="d-none mt-4">
                            <h5>Мои заявки</h5>
                            <table class="table">
                                <thead>
                                    <tr><th>Вакансия</th><th>Статус</th><th>Дата</th><th></th></tr>
                                </thead>
                                <tbody id="applicationsBody"></tbody>
                            </table>
                        </div>
                        
                        <!-- Раздел работодателя -->
                        <div id="employerSection" class="d-none mt-4">
                            <h5>Мои вакансии и заявки</h5>
                            <div id="employerVacancies"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer class="text-center mt-5 py-3 text-muted">
        <p>&copy; 2024 Работа в кампусе</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // если не залогинен — редирект
            if (!isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }
            
            // обновляем navbar
            document.getElementById('navLogin').classList.add('d-none');
            document.getElementById('navProfile').classList.remove('d-none');
            document.getElementById('navLogout').classList.remove('d-none');
            document.getElementById('navLogout').addEventListener('click', logout);
            
            // загружаем данные пользователя
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            
            // показываем профиль
            document.getElementById('profileInfo').innerHTML =
                '<h4>' + user.name + '</h4>' +
                '<p class="text-muted">' + user.email + '</p>' +
                '<p>Роль: ' + (user.role === 'student' ? 'Студент' : 'Работодатель') + '</p>';
            
            if (user.role === 'student') {
                await loadStudentSection();
            } else {
                await loadEmployerSection(user);
            }
        });

        // раздел студента — мои заявки
        async function loadStudentSection() {
            document.getElementById('studentSection').classList.remove('d-none');
            const resp = await apiRequest('/api/applications/my');
            const apps = await resp.json();
            const tbody = document.getElementById('applicationsBody');
            
            if (apps.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">Нет заявок</td></tr>';
                return;
            }
            
            apps.forEach(function(a) {
                tbody.innerHTML += '<tr>' +
                    '<td><a href="/vacancy.html?id=' + a.vacancy_id + '">' + (a.vacancy_title || 'Вакансия') + '</a></td>' +
                    '<td>' + (a.status_name || '') + '</td>' +
                    '<td>' + new Date(a.created_at).toLocaleDateString('ru-RU') + '</td>' +
                    '<td><button class="btn btn-sm btn-outline-danger" onclick="deleteApp(' + a.id + ', this)">Отозвать</button></td>' +
                    '</tr>';
            });
        }

        async function deleteApp(id, btn) {
            if (!confirm('Отозвать заявку?')) return;
            const resp = await apiRequest('/api/applications/' + id, {method: 'DELETE'});
            if (resp.ok) {
                btn.closest('tr').remove();
            }
        }

        // раздел работодателя — его вакансии и заявки
        async function loadEmployerSection(user) {
            document.getElementById('employerSection').classList.remove('d-none');
            // employer_id берём из ответа /api/auth/me
            const employerId = user.employer_id;
            if (!employerId) {
                document.getElementById('employerSection').innerHTML = '<p class="text-muted">Профиль работодателя не настроен</p>';
                return;
            }
            
            const resp = await apiRequest('/api/vacancies/?employer_id=' + employerId);
            const vacancies = await resp.json();
            const container = document.getElementById('employerVacancies');
            
            if (vacancies.length === 0) {
                container.innerHTML = '<p class="text-muted">Нет вакансий</p>';
                return;
            }
            
            for (const v of vacancies) {
                const vacBlock = document.createElement('div');
                vacBlock.className = 'mb-4';
                vacBlock.innerHTML = '<h6><a href="/vacancy.html?id=' + v.id + '">' + v.title + '</a></h6>';
                
                // загружаем заявки на эту вакансию
                const appResp = await apiRequest('/api/applications/vacancy/' + v.id);
                const apps = await appResp.json();
                
                if (apps.length === 0) {
                    vacBlock.innerHTML += '<p class="text-muted small">Нет заявок</p>';
                } else {
                    let tableHtml = '<table class="table table-sm"><thead><tr><th>Студент</th><th>Статус</th><th>Изменить статус</th></tr></thead><tbody>';
                    apps.forEach(function(a) {
                        tableHtml += '<tr>' +
                            '<td>' + (a.vacancy_title || 'Заявка #' + a.id) + '</td>' +
                            '<td id="status_' + a.id + '">' + (a.status_name || '') + '</td>' +
                            '<td><select class="form-select form-select-sm" onchange="updateStatus(' + a.id + ', this.value)">' +
                            '<option value="1">На рассмотрении</option>' +
                            '<option value="2">Просмотрено</option>' +
                            '<option value="3">Принято</option>' +
                            '<option value="4">Отклонено</option>' +
                            '</select></td>' +
                            '</tr>';
                    });
                    tableHtml += '</tbody></table>';
                    vacBlock.innerHTML += tableHtml;
                }
                container.appendChild(vacBlock);
            }
        }

        async function updateStatus(appId, statusId) {
            await apiRequest('/api/applications/' + appId + '/status', {
                method: 'PUT',
                body: JSON.stringify({status_id: parseInt(statusId)})
            });
        }
    </script>
</body>
</html>
