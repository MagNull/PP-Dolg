<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/index.html">Работа в кампусе</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/index.html">Вакансии</a>
                    <a class="nav-link" id="navLogin" href="/login.html">Войти</a>
                    <a class="nav-link d-none" id="navProfile" href="/profile.html">Профиль</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">Регистрация</h4>
                    </div>
                    <div class="card-body">
                        <div id="error" class="alert alert-danger d-none"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Имя</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="Ваше имя" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="role" class="form-label">Роль</label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="student">Студент</option>
                                    <option value="employer">Работодатель</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <a href="/login.html">Уже есть аккаунт? Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer class="text-center mt-5 py-3 text-muted">
        <p>&copy; 2024 Работа в кампусе</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // обновляем navbar при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            if (isLoggedIn()) {
                document.getElementById('navLogin').classList.add('d-none');
                document.getElementById('navProfile').classList.remove('d-none');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            
            const response = await apiRequest('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                // авто-логин после регистрации
                const loginResp = await apiRequest('/api/auth/login', {
                    method: 'POST',
                    body: new URLSearchParams({username: data.email, password: data.password})
                });
                if (loginResp.ok) {
                    const tokenData = await loginResp.json();
                    saveToken(tokenData.access_token);
                }
                window.location.href = '/index.html';
            } else {
                const err = await response.json();
                document.getElementById('error').textContent = err.detail || 'Ошибка регистрации';
                document.getElementById('error').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
